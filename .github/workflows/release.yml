name: Release
on:
  push:
    tags: ["*"]

permissions:
  contents: write # KLUCZOWE: Pozwala na tworzenie Release

jobs:
  publish:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, use_cross: false }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, use_cross: true }
          - { os: ubuntu-latest, target: armv7-unknown-linux-gnueabihf, use_cross: true }
          - { os: ubuntu-latest, target: i686-unknown-linux-gnu, use_cross: true }
          # FreeBSD / BSDs
          - { os: ubuntu-latest, target: i686-unknown-freebsd, use_cross: true }
          - { os: ubuntu-latest, target: x86_64-unknown-freebsd, use_cross: true }
          - { os: ubuntu-latest, target: armv6-unknown-freebsd, use_cross: true }
          - { os: ubuntu-latest, target: x86_64-unknown-netbsd, use_cross: true }
          - { os: ubuntu-latest, target: x86_64-unknown-openbsd, use_cross: true }
          # MacOS
          - { os: macos-latest, target: x86_64-apple-darwin, use_cross: false }
          # M$
          - { os: windows-latest, target: i686-pc-windows-gnu, use_cross: false }
          - { os: windows-latest, target: x86_64-pc-windows-gnu, use_cross: false }

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.use_cross
        run: |
          curl -L https://github.com | tar xz -C /home/runner/.cargo/bin
        shell: bash

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../k7s-${{ matrix.target }}.tar.gz k7s
        shell: bash

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../k7s-${{ matrix.target }}.zip k7s.exe
        shell: bash

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: k7s-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
